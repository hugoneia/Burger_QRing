name: CI & EAS Android Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Traer el código del repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configurar Node.js 24
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # 3. Instalar pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      # 4. Eliminar lockfile antiguo e instalar dependencias de cero
      - name: Clean lockfile and Install dependencies
        run: |
          rm -f pnpm-lock.yaml
          pnpm store prune
          pnpm install --no-frozen-lockfile

      # 5. Compilar el proyecto raíz de forma limpia y recursiva
      - name: Build workspace project
        run: |
          pnpm -r --if-present run build
        env:
          PORT: 3000
          EXPO_PUBLIC_DOMAIN: localhost

      # 6. Configurar la herramienta de EAS (Expo) en el servidor de GitHub
      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # 7. Disparar la creación automática de tu APK en la nube de Expo
      - name: Build APK (EAS Build)
        run: |
          cd artifacts/mobile
          eas build --platform android --profile preview --non-interactive
