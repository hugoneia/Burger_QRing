name: BK Free Drink v1.01

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"
  # Forzamos a Node a usar IPv4 de forma nativa para evitar retardos locales en el puerto 8081
  NODE_OPERATION_QUALITY: "ipv4first"
  NODE_OPTIONS: "--dns-result-order=ipv4first"

jobs:
  build:
    runs-on: ubuntu-latest

    # Otorgamos permisos de escritura al token de GitHub para que pueda subir el lockfile corregido
    permissions:
      contents: write

    steps:
      # 1. Traer el código del repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configurar Node.js 24
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # 3. Instalar pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      # 4. Eliminar lockfile antiguo, regenerarlo correctamente de cero y sincronizar el repositorio
      - name: Sincronizar y actualizar lockfile de pnpm
        run: |
          rm -f pnpm-lock.yaml
          pnpm store prune
          pnpm install --no-frozen-lockfile
          
          # Configurar Git para subir los cambios automáticos del lockfile si hay diferencias
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain pnpm-lock.yaml)" ]; then
            git add pnpm-lock.yaml
            git commit -m "chore: actualizar pnpm-lock.yaml automáticamente [skip ci]"
            git push
          fi

      # 5. Compilar el proyecto raíz de forma limpia y recursiva (Con memoria ampliada)
      - name: Build workspace project
        run: |
          pnpm -r --if-present run build
        env:
          PORT: 3000
          EXPO_PUBLIC_DOMAIN: localhost
          # MODIFICACIÓN: Le damos 4GB de RAM a Node para evitar el colapso (HTTP 500) en el 98%
          NODE_OPTIONS: "--max-old-space-size=4096 --dns-result-order=ipv4first"

      # 6. Configurar la herramienta de EAS (Expo) en el servidor de GitHub
      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # 7. Forzar la vinculación del proyecto y disparar la creación del APK
      - name: Build APK (EAS Build)
        run: |
          cd artifacts/mobile
          eas init --id "bd51507e-7270-4923-8b4d-81351a516a8a" --non-interactive
          eas build --platform android --profile preview --non-interactive
