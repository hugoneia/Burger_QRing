name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Silenciamos la advertencia de Node 20 a nivel global del proceso
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Traer el código del repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configurar Node.js 24
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # 3. Instalar pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      # 4. Eliminar lockfile antiguo e instalar de cero con overrides estrictos
      - name: Clean lockfile and Install dependencies
        run: |
          rm -f pnpm-lock.yaml
          pnpm store prune
          pnpm install --no-frozen-lockfile

      # 5. Compilar saltándose el chequeo estricto
      - name: Build project
        run: |
          pnpm run build --if-present || pnpm -r --if-present run build
        env:
          PORT: 3000
          EXPO_PUBLIC_DOMAIN: localhost

      # 6. Ejecutar tests
      - name: Run tests
        run: pnpm test --if-present
