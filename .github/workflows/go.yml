name: BK Free Drink v1.01

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"
  NODE_OPERATION_QUALITY: "ipv4first"
  # MODIFICACIÓN CLAVE: Inyectamos la memoria máxima directamente aquí para que afecte también al empaquetador embebido de Gradle
  NODE_OPTIONS: "--max-old-space-size=4096 --dns-result-order=ipv4first"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # 1. Traer el código del repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configurar Node.js 24
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # 3. Instalar pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      # 4. Eliminar lockfile antiguo y sincronizar
      - name: Sincronizar y actualizar lockfile de pnpm
        run: |
          rm -f pnpm-lock.yaml
          pnpm store prune
          pnpm install --no-frozen-lockfile
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain pnpm-lock.yaml)" ]; then
            git add pnpm-lock.yaml
            git commit -m "chore: actualizar pnpm-lock.yaml automáticamente [skip ci]"
            git push
          fi

      # 5. Compilar el proyecto raíz con memoria ampliada
      - name: Build workspace project
        run: |
          pnpm -r --if-present run build
        env:
          PORT: 3000
          EXPO_PUBLIC_DOMAIN: localhost

      # 6. Instalar Java (Requerido para compilar Android)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 7. Configurar herramientas y entorno Android nativo
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 8. Generar los directorios nativos de Android mediante Expo Prebuild
      - name: Run Expo Prebuild
        run: |
          cd artifacts/mobile
          npx expo prebuild --platform android --no-install

      # 9. Compilar el APK usando Gradle (Pasando la RAM también a las opciones de compilación nativa)
      - name: Build Android App (Local Gradle)
        run: |
          cd artifacts/mobile/android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
        env:
          # Evita fugas de memoria en la máquina virtual de ejecución de Java
          _JAVA_OPTIONS: "-Xmx4096m"

      # 10. Guardar el archivo APK generado para descargar
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bk-free-drink-apk
          path: artifacts/mobile/android/app/build/outputs/apk/release/app-release.apk
