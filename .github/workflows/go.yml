name: Node & PNPM CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Descarga el código de tu repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Instala pnpm de forma automática
      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: latest # Usa la última versión disponible de pnpm

      # 3. Configura Node.js y activa la caché de pnpm para que vaya ultra rápido
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Versión estable recomendada
          cache: 'pnpm'

      # 4. Instala las dependencias ignorando scripts problemáticos
      - name: Install dependencies
        run: pnpm install --ignore-scripts

      # 5. Compila el proyecto TypeScript
      - name: Build project
        run: pnpm run build --if-present

      # 6. Ejecuta los tests automáticos (si tienes configurados)
      - name: Run tests
        run: pnpm test --if-present
